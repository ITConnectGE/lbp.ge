<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280">
  <defs>
    <linearGradient id="bgDebt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d44"/>
    </linearGradient>
  </defs>
  <rect width="600" height="280" fill="url(#bgDebt)"/>
  <!-- Coin stack -->
  <g transform="translate(300,140)" opacity="0.4">
    <ellipse cx="0" cy="0" rx="32" ry="9" fill="none" stroke="#b08d57" stroke-width="2"/>
    <ellipse cx="0" cy="-12" rx="32" ry="9" fill="none" stroke="#b08d57" stroke-width="2"/>
    <ellipse cx="0" cy="-24" rx="32" ry="9" fill="none" stroke="#b08d57" stroke-width="2"/>
    <ellipse cx="0" cy="-36" rx="32" ry="9" fill="none" stroke="#c9a76c" stroke-width="2.5"/>
    <text x="0" y="-32" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#c9a76c" opacity="0.7">₾</text>
  </g>
  <!-- Arrow returning (recovery) -->
  <g transform="translate(300,110)" opacity="0.3">
    <path d="M -70,-30 Q -90,-50 -60,-60 L 60,-60 Q 90,-50 70,-30" fill="none" stroke="#b08d57" stroke-width="2" stroke-linecap="round"/>
    <polyline points="60,-38 70,-30 60,-22" fill="none" stroke="#b08d57" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="80" cy="60" r="3" fill="#b08d57" opacity="0.2"/>
  <circle cx="520" cy="220" r="3" fill="#b08d57" opacity="0.2"/>
  <circle cx="150" cy="230" r="2" fill="#b08d57" opacity="0.15"/>
  <circle cx="450" cy="50" r="2" fill="#b08d57" opacity="0.15"/>
  <!-- Accent line -->
  <rect x="40" y="240" width="24" height="2" rx="1" fill="#b08d57" opacity="0.3"/>
</svg>
