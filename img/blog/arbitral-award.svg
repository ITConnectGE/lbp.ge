<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280">
  <defs>
    <linearGradient id="bgArb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d44"/>
    </linearGradient>
  </defs>
  <rect width="600" height="280" fill="url(#bgArb)"/>
  <!-- Gavel -->
  <g transform="translate(300,135) rotate(-25)" opacity="0.4">
    <rect x="-44" y="-12" width="58" height="24" rx="3" fill="none" stroke="#b08d57" stroke-width="2.5"/>
    <rect x="-22" y="-6" width="14" height="12" fill="#b08d57" opacity="0.3"/>
    <rect x="14" y="-3" width="60" height="6" rx="2" fill="none" stroke="#b08d57" stroke-width="2"/>
  </g>
  <!-- Strike plate -->
  <g transform="translate(300,200)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="60" ry="6" fill="none" stroke="#c9a76c" stroke-width="2"/>
    <ellipse cx="0" cy="-3" rx="60" ry="6" fill="none" stroke="#c9a76c" stroke-width="2"/>
  </g>
  <!-- Justice scale balance dots -->
  <g transform="translate(300, 70)" opacity="0.18">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#c9a76c" stroke-width="1.5"/>
    <circle cx="-40" cy="6" r="6" fill="none" stroke="#c9a76c" stroke-width="1.5"/>
    <circle cx="40" cy="6" r="6" fill="none" stroke="#c9a76c" stroke-width="1.5"/>
    <line x1="0" y1="-10" x2="0" y2="0" stroke="#c9a76c" stroke-width="1.5"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="80" cy="60" r="3" fill="#b08d57" opacity="0.2"/>
  <circle cx="520" cy="220" r="3" fill="#b08d57" opacity="0.2"/>
  <circle cx="150" cy="240" r="2" fill="#b08d57" opacity="0.15"/>
  <circle cx="450" cy="50" r="2" fill="#b08d57" opacity="0.15"/>
  <!-- Accent line -->
  <rect x="40" y="240" width="24" height="2" rx="1" fill="#b08d57" opacity="0.3"/>
</svg>
