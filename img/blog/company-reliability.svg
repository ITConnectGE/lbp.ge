<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280">
  <defs>
    <linearGradient id="bgRel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2d44"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="280" fill="url(#bgRel)"/>
  <!-- Shield with check -->
  <g transform="translate(300,130)">
    <path d="M 0,-50 L 38,-38 L 38,8 Q 38,38 0,52 Q -38,38 -38,8 L -38,-38 Z"
          fill="none" stroke="#b08d57" stroke-width="2.5" opacity="0.4"/>
    <polyline points="-15,5 -3,17 16,-10" fill="none" stroke="#c9a76c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
  <!-- Magnifying glass accent -->
  <g transform="translate(420,200)" opacity="0.18">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#c9a76c" stroke-width="2"/>
    <line x1="10" y1="10" x2="22" y2="22" stroke="#c9a76c" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="100" cy="50" r="3" fill="#b08d57" opacity="0.2"/>
  <circle cx="500" cy="60" r="3" fill="#b08d57" opacity="0.2"/>
  <circle cx="170" cy="240" r="2" fill="#b08d57" opacity="0.15"/>
  <circle cx="440" cy="40" r="2" fill="#b08d57" opacity="0.15"/>
  <!-- Accent line -->
  <rect x="40" y="240" width="24" height="2" rx="1" fill="#b08d57" opacity="0.3"/>
</svg>
