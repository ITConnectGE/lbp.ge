<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LBP — Legal & Business Partners. Gallery — photos from our office, team, and events." />
    <link rel="canonical" href="https://lbp.ge/en/gallery/" />
    <link rel="alternate" hreflang="en" href="https://lbp.ge/en/gallery/" />
    <link rel="alternate" hreflang="ka" href="https://lbp.ge/ka/gallery/" />
    <link rel="shortcut icon" href="/img/iconi.png" />
    <link rel="stylesheet" href="/css/global.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Noto+Sans+Georgian:wght@400;500;600;700&family=Noto+Serif+Georgian:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Gallery — LBP</title>
    <style>
      .gallery-page {
        background: var(--color-primary);
        color: #fff;
        padding: 80px 0 100px;
        position: relative;
        overflow: hidden;
      }
      .gallery-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 20% 30%, rgba(176, 141, 87, 0.15), transparent 50%),
                    radial-gradient(ellipse at 80% 70%, rgba(176, 141, 87, 0.08), transparent 50%);
        pointer-events: none;
      }
      .gallery-page .section-title { position: relative; z-index: 2; margin-bottom: 16px; }
      .gallery-page .section-title h1 { color: #fff; }
      .gallery-page .section-title::before,
      .gallery-page .section-title::after { background: rgba(255,255,255,0.3); }
      .gallery-subtitle {
        text-align: center;
        max-width: 720px;
        margin: 0 auto 56px;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.7;
        position: relative;
        z-index: 2;
        padding: 0 20px;
      }
      .gallery-viewport { position: relative; z-index: 2; }
      .gallery-track {
        display: flex;
        gap: 24px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
        padding: 0 max(8vw, 80px);
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .gallery-track::-webkit-scrollbar { display: none; }
      .gallery-item {
        flex: 0 0 auto;
        width: clamp(280px, 48vw, 640px);
        aspect-ratio: 4 / 3;
        scroll-snap-align: center;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
        cursor: zoom-in;
        background: #0d1b2a;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.4s;
        filter: brightness(0.92);
      }
      .gallery-item:hover img,
      .gallery-item:focus img { filter: brightness(1); transform: scale(1.04); }

      .gallery-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        margin-top: 48px;
        position: relative;
        z-index: 2;
      }
      .gallery-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s, border-color 0.3s, transform 0.3s, color 0.3s;
      }
      .gallery-btn:hover {
        background: var(--color-accent);
        border-color: var(--color-accent);
        color: var(--color-primary);
        transform: scale(1.05);
      }
      .gallery-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
      .gallery-btn::before {
        content: "";
        width: 12px;
        height: 12px;
        border-right: 2px solid currentColor;
        border-top: 2px solid currentColor;
        transform: rotate(45deg) translate(-2px, 2px);
      }
      .gallery-btn--prev::before { transform: rotate(-135deg) translate(-2px, 2px); }

      .gallery-counter {
        font-family: var(--font-heading);
        font-size: 1.4rem;
        color: rgba(255,255,255,0.85);
        letter-spacing: 0.1em;
        min-width: 80px;
        text-align: center;
      }
      .gallery-counter b { color: var(--color-accent); font-weight: 600; }

      .gallery-lightbox {
        position: fixed;
        inset: 0;
        background: rgba(13, 27, 42, 0.96);
        z-index: 2000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .gallery-lightbox.open { display: flex; }
      .gallery-lightbox img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 4px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }
      .gallery-lightbox-close {
        position: absolute;
        top: 24px;
        right: 24px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        font-size: 1.6rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }
      .gallery-lightbox-close:hover { background: var(--color-accent); border-color: var(--color-accent); color: var(--color-primary); }

      @media (max-width: 768px) {
        .gallery-page { padding: 56px 0 72px; }
        .gallery-track { padding: 0 24px; gap: 12px; }
        .gallery-item { width: 75vw; }
        .gallery-btn { width: 44px; height: 44px; }
      }
    </style>
  </head>
  <body>
    <header class="header"></header>
    <section class="gallery-page">
      <div class="section-title"><h1>Gallery</h1></div>
      <p class="gallery-subtitle">Photos from the LBP office, team and notable events.</p>

      <div class="gallery-viewport">
        <div class="gallery-track" id="galleryTrack">
          <a class="gallery-item" data-full="/img/gallery/lbpgallery1.jpeg"><img src="/img/gallery/lbpgallery1.jpeg" alt="LBP gallery 1" loading="lazy" style="object-position: center 20%;" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp2.jpeg"><img src="/img/gallery/lbp2.jpeg" alt="LBP gallery 2" loading="lazy" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp3.jpeg"><img src="/img/gallery/lbp3.jpeg" alt="LBP gallery 3" loading="lazy" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp4.jpeg"><img src="/img/gallery/lbp4.jpeg" alt="LBP gallery 4" loading="lazy" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp5.jpeg"><img src="/img/gallery/lbp5.jpeg" alt="LBP gallery 5" loading="lazy" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp6.jpeg"><img src="/img/gallery/lbp6.jpeg" alt="LBP gallery 6" loading="lazy" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp7.jpeg"><img src="/img/gallery/lbp7.jpeg" alt="LBP gallery 7" loading="lazy" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp8.jpeg"><img src="/img/gallery/lbp8.jpeg" alt="LBP gallery 8" loading="lazy" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp9.jpeg"><img src="/img/gallery/lbp9.jpeg" alt="LBP gallery 9" loading="lazy" /></a>
          <a class="gallery-item" data-full="/img/gallery/lbp10.jpeg"><img src="/img/gallery/lbp10.jpeg" alt="LBP gallery 10" loading="lazy" /></a>
        </div>

        <div class="gallery-nav">
          <button class="gallery-btn gallery-btn--prev" id="galleryPrev" aria-label="Previous"></button>
          <span class="gallery-counter"><b id="galleryCurrent">01</b> / <span id="galleryTotal">10</span></span>
          <button class="gallery-btn gallery-btn--next" id="galleryNext" aria-label="Next"></button>
        </div>
      </div>
    </section>

    <div class="gallery-lightbox" id="galleryLightbox">
      <button class="gallery-lightbox-close" id="galleryLightboxClose" aria-label="Close">×</button>
      <img id="galleryLightboxImg" alt="" />
    </div>

    <footer class="footer"></footer>
    <footer class="footer-mobile"></footer>
    <button class="back-to-top" aria-label="Back to top"></button>
    <script src="/scripts/header.js"></script>
    <script src="/scripts/footer.js"></script>
    <script src="/scripts/lang.js"></script>
    <script src="/scripts/index.js"></script>
    <script src="/scripts/cookie-consent.js"></script>
    <script>
      (function () {
        var track = document.getElementById("galleryTrack");
        var items = track.querySelectorAll(".gallery-item");
        var prevBtn = document.getElementById("galleryPrev");
        var nextBtn = document.getElementById("galleryNext");
        var current = document.getElementById("galleryCurrent");
        var total = document.getElementById("galleryTotal");
        var lightbox = document.getElementById("galleryLightbox");
        var lightboxImg = document.getElementById("galleryLightboxImg");
        var lightboxClose = document.getElementById("galleryLightboxClose");

        total.textContent = String(items.length).padStart(2, "0");
        function pad(n) { return String(n + 1).padStart(2, "0"); }

        function activeIndex() {
          var center = track.scrollLeft + track.clientWidth / 2;
          var bestIdx = 0, bestDist = Infinity;
          for (var i = 0; i < items.length; i++) {
            var el = items[i];
            var c = el.offsetLeft + el.offsetWidth / 2;
            var d = Math.abs(c - center);
            if (d < bestDist) { bestDist = d; bestIdx = i; }
          }
          return bestIdx;
        }
        function update() {
          var i = activeIndex();
          current.textContent = pad(i);
          prevBtn.disabled = i === 0;
          nextBtn.disabled = i === items.length - 1;
        }
        function scrollTo(idx) {
          if (idx < 0 || idx >= items.length) return;
          var el = items[idx];
          var target = el.offsetLeft - (track.clientWidth - el.offsetWidth) / 2;
          track.scrollTo({ left: target, behavior: "smooth" });
        }

        prevBtn.addEventListener("click", function () { scrollTo(activeIndex() - 1); });
        nextBtn.addEventListener("click", function () { scrollTo(activeIndex() + 1); });
        track.addEventListener("scroll", function () {
          window.requestAnimationFrame(update);
        });

        items.forEach(function (it) {
          it.addEventListener("click", function (e) {
            e.preventDefault();
            lightboxImg.src = it.getAttribute("data-full");
            lightbox.classList.add("open");
            document.body.style.overflow = "hidden";
          });
        });
        function closeLightbox() {
          lightbox.classList.remove("open");
          lightboxImg.src = "";
          document.body.style.overflow = "";
        }
        lightboxClose.addEventListener("click", closeLightbox);
        lightbox.addEventListener("click", function (e) {
          if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener("keydown", function (e) {
          if (lightbox.classList.contains("open") && e.key === "Escape") closeLightbox();
          if (!lightbox.classList.contains("open")) {
            if (e.key === "ArrowLeft") scrollTo(activeIndex() - 1);
            if (e.key === "ArrowRight") scrollTo(activeIndex() + 1);
          }
        });

        update();
      })();
    </script>
  </body>
</html>
